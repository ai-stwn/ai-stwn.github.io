<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genki I Quiz Generator</title>
    <style>
        :root {
            --primary: #e63946;
            --secondary: #457b9d;
            --light: #f1faee;
            --dark: #1d3557;
            --success: #2a9d8f;
            --warning: #e9c46a;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--light) 0%, #a8dadc 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: var(--dark);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        h1 .jp {
            color: var(--primary);
        }
        
        .subtitle {
            color: var(--secondary);
            font-size: 1.1rem;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: var(--dark);
            margin-bottom: 16px;
            font-size: 1.3rem;
        }
        
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }
        
        .chapter-btn {
            padding: 12px;
            border: 2px solid var(--secondary);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        
        .chapter-btn:hover {
            background: var(--light);
        }
        
        .chapter-btn.selected {
            background: var(--secondary);
            color: white;
        }
        
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 16px 0;
        }
        
        .option-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .option-group label {
            color: var(--dark);
            font-size: 0.9rem;
        }
        
        select, input[type="number"] {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: #c1121f;
            transform: translateY(-2px);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: var(--secondary);
            color: white;
        }
        
        .btn-secondary:hover {
            background: #2a6f97;
        }
        
        /* Quiz UI */
        #quiz-area {
            display: none;
        }
        
        .progress-bar {
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--success);
            transition: width 0.3s;
        }
        
        .question-counter {
            text-align: center;
            color: var(--secondary);
            margin-bottom: 10px;
        }
        
        .question {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .question-text {
            font-size: 1.8rem;
            color: var(--dark);
            margin-bottom: 8px;
        }
        
        .question-text.japanese {
            font-size: 2.5rem;
        }
        
        .question-hint {
            color: #666;
            font-size: 0.95rem;
        }
        
        .answers {
            display: grid;
            gap: 12px;
        }
        
        .answer-btn {
            padding: 16px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1rem;
            text-align: left;
        }
        
        .answer-btn:hover:not(.disabled) {
            border-color: var(--secondary);
            background: var(--light);
        }
        
        .answer-btn.correct {
            border-color: var(--success);
            background: #d4edda;
        }
        
        .answer-btn.incorrect {
            border-color: var(--primary);
            background: #f8d7da;
        }
        
        .answer-btn.disabled {
            cursor: default;
        }
        
        .feedback {
            text-align: center;
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }
        
        .feedback.show {
            display: block;
        }
        
        .feedback.correct {
            background: #d4edda;
            color: #155724;
        }
        
        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
        }
        
        .next-btn {
            margin-top: 20px;
            width: 100%;
        }
        
        /* Results */
        #results-area {
            display: none;
            text-align: center;
        }
        
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--success);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
        }
        
        .score-circle.medium {
            background: var(--warning);
            color: var(--dark);
        }
        
        .score-circle.low {
            background: var(--primary);
        }
        
        .score-number {
            font-size: 2.5rem;
            font-weight: bold;
        }
        
        .score-label {
            font-size: 0.9rem;
        }
        
        .results-message {
            font-size: 1.3rem;
            color: var(--dark);
            margin: 20px 0;
        }
        
        .results-breakdown {
            text-align: left;
            margin: 20px 0;
        }
        
        .results-breakdown h3 {
            margin-bottom: 12px;
            color: var(--dark);
        }
        
        .missed-item {
            padding: 12px;
            background: #fff5f5;
            border-left: 4px solid var(--primary);
            margin-bottom: 8px;
            border-radius: 0 8px 8px 0;
        }
        
        .missed-item .jp {
            font-size: 1.2rem;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        
        /* Input quiz type */
        .input-answer {
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 12px;
        }
        
        .input-answer:focus {
            outline: none;
            border-color: var(--secondary);
        }
        
        .input-answer.correct {
            border-color: var(--success);
            background: #d4edda;
        }
        
        .input-answer.incorrect {
            border-color: var(--primary);
            background: #f8d7da;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Genki I <span class="jp">クイズ</span></h1>
            <p class="subtitle">Interactive Quiz Generator</p>
        </header>
        
        <!-- Setup Area -->
        <div id="setup-area">
            <div class="card">
                <h2>📚 Select Chapters</h2>
                <div class="chapter-grid" id="chapter-grid"></div>
            </div>
            
            <div class="card">
                <h2>⚙️ Quiz Options</h2>
                <div class="options">
                    <div class="option-group">
                        <label for="quiz-type">Type:</label>
                        <select id="quiz-type">
                            <option value="vocab-en">Vocabulary (JP → EN)</option>
                            <option value="vocab-jp">Vocabulary (EN → JP)</option>
                            <option value="vocab-reading">Vocabulary (Kanji → Reading)</option>
                            <option value="grammar">Grammar</option>
                            <option value="mixed">Mixed</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <label for="question-count">Questions:</label>
                        <input type="number" id="question-count" value="10" min="5" max="50">
                    </div>
                    <div class="option-group">
                        <label for="answer-type">Answer:</label>
                        <select id="answer-type">
                            <option value="multiple">Multiple Choice</option>
                            <option value="typing">Typing</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" id="start-btn" disabled>Start Quiz</button>
            </div>
        </div>
        
        <!-- Quiz Area -->
        <div id="quiz-area">
            <div class="card">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <p class="question-counter" id="question-counter"></p>
                
                <div class="question">
                    <p class="question-text" id="question-text"></p>
                    <p class="question-hint" id="question-hint"></p>
                </div>
                
                <div id="answers-container"></div>
                
                <div class="feedback" id="feedback"></div>
                
                <button class="btn btn-secondary next-btn" id="next-btn" style="display:none;">Next Question →</button>
            </div>
        </div>
        
        <!-- Results Area -->
        <div id="results-area">
            <div class="card">
                <h2>🎉 Quiz Complete!</h2>
                <div class="score-circle" id="score-circle">
                    <span class="score-number" id="score-number"></span>
                    <span class="score-label">correct</span>
                </div>
                <p class="results-message" id="results-message"></p>
                
                <div class="results-breakdown" id="results-breakdown"></div>
                
                <div class="btn-group">
                    <button class="btn btn-primary" id="retry-btn">Try Again</button>
                    <button class="btn btn-secondary" id="new-quiz-btn">New Quiz</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="data.js"></script>
    <script src="quiz.js"></script>
</body>
</html>
